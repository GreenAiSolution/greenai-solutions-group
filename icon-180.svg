<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5c2a"/>
      <stop offset="100%" style="stop-color:#236b35"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf6e"/>
      <stop offset="100%" style="stop-color:#2e8b47"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676"/>
      <stop offset="100%" style="stop-color:#00C853"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="180" height="180" rx="36" ry="36" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <line x1="0" y1="60" x2="180" y2="60" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="120" x2="180" y2="120" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="60" y1="0" x2="60" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="120" y1="0" x2="120" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Hexagon icon mark — centered -->
  <polygon points="90,28 124,48 124,88 90,108 56,88 56,48" fill="url(#hexGrad)"/>

  <!-- AI chip accent lines — right -->
  <line x1="124" y1="54" x2="134" y2="54" stroke="#4caf6e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="124" y1="68" x2="138" y2="68" stroke="#4caf6e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="124" y1="82" x2="134" y2="82" stroke="#4caf6e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- AI chip accent lines — left -->
  <line x1="56" y1="54" x2="46" y2="54" stroke="#4caf6e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="68" x2="42" y2="68" stroke="#4caf6e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="82" x2="46" y2="82" stroke="#4caf6e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- G letter inside hex -->
  <text x="90" y="85" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle">G</text>

  <!-- Wordmark bottom -->
  <text x="90" y="138" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">GreenAI</text>

  <!-- Sub-label -->
  <text x="90" y="158" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="3">SOLUTION TEAM</text>
</svg>
