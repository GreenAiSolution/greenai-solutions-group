<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="gGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C853"/>
      <stop offset="100%" style="stop-color:#00897B"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676"/>
      <stop offset="100%" style="stop-color:#1DE9B6"/>
    </linearGradient>
  </defs>

  <!-- Hexagon icon mark -->
  <polygon points="52,10 88,30 88,70 52,90 16,70 16,30" fill="url(#gGrad)" />
  <!-- G letter inside hex -->
  <text x="52" y="62" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">G</text>
  <!-- AI chip accent lines -->
  <line x1="88" y1="38" x2="96" y2="38" stroke="#00C853" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="50" x2="100" y2="50" stroke="#00C853" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="62" x2="96" y2="62" stroke="#00C853" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="38" x2="8" y2="38" stroke="#00C853" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="50" x2="4" y2="50" stroke="#00C853" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="62" x2="8" y2="62" stroke="#00C853" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="116" y="56" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#0D1117" letter-spacing="1">Green</text>
  <text x="228" y="56" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="url(#gGrad)" letter-spacing="1">AI</text>

  <!-- Tagline -->
  <text x="116" y="78" font-family="Arial, sans-serif" font-size="11" fill="#555" letter-spacing="3.5" font-weight="600">Solutions Team</text>
</svg>
