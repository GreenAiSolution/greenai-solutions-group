<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — GreenAI Solutions Team</title>
  <meta name="description" content="The page you're looking for doesn't exist. Head back to the GreenAI Solutions Team homepage." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=7" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <style>
    .errorpage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2114 0%, #1a5c2a 50%, #236b35 100%);
      color: #fff;
      text-align: center;
      padding: 3rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .errorpage::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    .errorpage__inner { position: relative; z-index: 1; max-width: 580px; }
    .errorpage__code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 18vw, 11rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #ffd97d, #e89c0a);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .errorpage h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      margin-bottom: 1rem;
      color: #ffffff;
    }
    .errorpage p {
      font-size: 1.05rem;
      color: rgba(255,255,255,.85);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .errorpage__actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .errorpage__btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .9rem 1.6rem;
      border-radius: 100px;
      font-weight: 600;
      text-decoration: none;
      transition: all .2s ease;
    }
    .errorpage__btn--primary {
      background: #fff;
      color: #1a5c2a;
    }
    .errorpage__btn--primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .errorpage__btn--ghost {
      background: rgba(255,255,255,.08);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,.45);
    }
    .errorpage__btn--ghost:hover {
      background: rgba(255,255,255,.16);
      border-color: #fff;
    }
  </style>
</head>
<body>
  <section class="errorpage">
    <div class="errorpage__inner">
      <div class="errorpage__code">404</div>
      <h1>This page wandered off into the desert</h1>
      <p>We couldn't find the page you were looking for. It may have moved, been renamed, or never existed — but we're still here, ready to help your business grow.</p>
      <div class="errorpage__actions">
        <a href="/" class="errorpage__btn errorpage__btn--primary">← Back to Home</a>
        <a href="/contact.html" class="errorpage__btn errorpage__btn--ghost">Contact GreenAI</a>
      </div>
    </div>
  </section>
</body>
</html>
