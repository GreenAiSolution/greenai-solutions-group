<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Desert Steam Auto Detail — CRM</title>
<style>
:root{--brand:#2e8b47;--bg:#0e1117;--panel:#161b22;--panel2:#1c232c;--line:rgba(255,255,255,.08);--txt:#e8eef2;--txt2:#90a0ad}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--txt);display:flex;min-height:100vh}
a{color:var(--brand)}
.side{width:230px;background:var(--panel);border-right:1px solid var(--line);padding:22px 14px;flex-shrink:0;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brand .dot{width:30px;height:30px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
.brand b{font-size:15px}
.sub{font-size:10px;color:var(--txt2);margin-bottom:24px;padding-left:2px}
.nav{display:flex;flex-direction:column;gap:4px}
.nav a{padding:10px 14px;border-radius:9px;color:var(--txt2);text-decoration:none;font-size:13.5px;font-weight:500;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:10px}
.nav a:hover{background:var(--panel2);color:var(--txt)}
.nav a.on{background:var(--brand);color:#fff}
.foot{position:absolute;bottom:18px;left:14px;right:14px;font-size:9.5px;color:var(--txt2);text-align:center;line-height:1.5}
.main{flex:1;padding:30px 38px;overflow:auto}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.head h1{font-size:22px}
.head .actions{display:flex;gap:10px}
.btn{background:var(--brand);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer}
.btn:hover{filter:brightness(1.1)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
.view{display:none}.view.on{display:block}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px}
.kpi .lbl{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em}
.kpi .val{font-size:30px;font-weight:800;margin-top:8px;color:var(--brand)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px}
.card h3{font-size:14px;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--txt2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:10px 12px;border-bottom:1px solid var(--line)}
td{padding:12px;border-bottom:1px solid var(--line)}
tr:hover td{background:var(--panel2)}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10.5px;background:rgba(255,255,255,.06);border:1px solid var(--line)}
.empty{text-align:center;padding:50px 20px;color:var(--txt2)}
.empty .ico{font-size:38px;margin-bottom:10px}
.lnk{color:var(--brand);cursor:pointer;font-size:12px}
.del{color:#e57373;cursor:pointer;font-size:12px}
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.col{min-width:230px;flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px}
.col h4{font-size:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.col h4 span{background:var(--panel2);border-radius:20px;padding:1px 8px;font-size:10px;color:var(--txt2)}
.deal{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px;margin-bottom:9px}
.deal b{font-size:12.5px}
.deal .meta{font-size:10.5px;color:var(--txt2);margin-top:3px}
.deal .val{color:var(--brand);font-weight:700;font-size:12px;margin-top:5px}
.deal select{width:100%;margin-top:7px;background:var(--bg);color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:4px;font-size:11px}
.task{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--line)}
.task input{width:17px;height:17px;accent-color:var(--brand)}
.task.done b{text-decoration:line-through;color:var(--txt2)}
.task .meta{font-size:10.5px;color:var(--txt2)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);align-items:center;justify-content:center;z-index:50;padding:20px}
.ov.on{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px;width:100%;max-width:480px;max-height:90vh;overflow:auto}
.modal h2{font-size:17px;margin-bottom:18px}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:11px;color:var(--txt2);margin-bottom:5px;font-weight:600}
.fld input,.fld select,.fld textarea{width:100%;background:var(--bg);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px}
.fld textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.tip{background:rgba(0,0,0,.2);border-left:3px solid var(--brand);border-radius:0 8px 8px 0;padding:11px 15px;font-size:12px;color:var(--txt2);margin-bottom:20px}
@media(max-width:820px){.side{display:none}.kpis{grid-template-columns:1fr 1fr}.main{padding:20px}}
</style>
</head>
<body>
<div class="side">
  <div class="brand"><div class="dot">D</div><b>Desert Steam Auto Detail</b></div>
  <div class="sub">CRM · Auto detailing (All vehicles)</div>
  <div class="nav">
    <a class="on" data-v="dashboard" onclick="go('dashboard',this)">📊 Dashboard</a>
    <a data-v="contacts" onclick="go('contacts',this)">👤 Contacts</a>
    <a data-v="pipeline" onclick="go('pipeline',this)">📈 Pipeline</a>
    <a data-v="tasks" onclick="go('tasks',this)">✅ Tasks</a>
  </div>
  <div class="foot">Built by GreenAI Solutions<br>greenaidigital.com</div>
</div>
<div class="main">
  <div id="v-dashboard" class="view on">
    <div class="head"><h1>Dashboard</h1><div class="actions"><button class="btn" onclick="openContact()">+ New Contact</button></div></div>
    <div class="tip" id="tipbox"></div>
    <div class="kpis" id="kpis"></div>
    <div class="card"><h3>Recent Contacts</h3><div id="recent"></div></div>
  </div>
  <div id="v-contacts" class="view">
    <div class="head"><h1>Contacts</h1><div class="actions"><button class="btn ghost" onclick="exportCSV()">⬇ Export CSV</button><button class="btn" onclick="openContact()">+ New Contact</button></div></div>
    <div class="card" id="contactsCard"></div>
  </div>
  <div id="v-pipeline" class="view">
    <div class="head"><h1>Pipeline</h1><div class="actions"><button class="btn" onclick="openContact()">+ New Contact</button></div></div>
    <div class="board" id="board"></div>
  </div>
  <div id="v-tasks" class="view">
    <div class="head"><h1>Tasks</h1><div class="actions"><button class="btn" onclick="openTask()">+ New Task</button></div></div>
    <div class="card" id="tasksCard"></div>
  </div>
</div>

<div class="ov" id="contactOv">
  <div class="modal">
    <h2 id="cTitle">New Contact</h2>
    <input type="hidden" id="cId">
    <div class="row2"><div class="fld"><label>Name</label><input id="cName" placeholder="Full name"></div><div class="fld"><label>Company</label><input id="cCompany" placeholder="Company"></div></div>
    <div class="row2"><div class="fld"><label>Email</label><input id="cEmail" placeholder="email@example.com"></div><div class="fld"><label>Phone</label><input id="cPhone" placeholder="(000) 000-0000"></div></div>
    <div class="row2"><div class="fld"><label>Lead Source</label><select id="cSource"></select></div><div class="fld"><label>Stage</label><select id="cStage"></select></div></div>
    <div class="row2"><div class="fld"><label>Deal Type</label><select id="cType"></select></div><div class="fld"><label>Deal Value ($)</label><input id="cValue" type="number" placeholder="0"></div></div>
    <div class="fld"><label>Notes</label><textarea id="cNotes" placeholder="Notes..."></textarea></div>
    <div class="mfoot"><button class="btn ghost" onclick="closeOv('contactOv')">Cancel</button><button class="btn" onclick="saveContact()">Save Contact</button></div>
  </div>
</div>
<div class="ov" id="taskOv">
  <div class="modal">
    <h2>New Task</h2>
    <div class="fld"><label>Task</label><select id="tType"></select></div>
    <div class="fld"><label>Details</label><input id="tTitle" placeholder="What needs to happen?"></div>
    <div class="fld"><label>Due Date</label><input id="tDue" type="date"></div>
    <div class="mfoot"><button class="btn ghost" onclick="closeOv('taskOv')">Cancel</button><button class="btn" onclick="saveTask()">Save Task</button></div>
  </div>
</div>

<script>
var CFG={"business":"Desert Steam Auto Detail","color":"#2e8b47","industry":"Auto detailing (All vehicles)","pipelineStages":["Lead Captured","Quote Requested","Quote Sent","Appointment Scheduled","Service Completed","Won/Lost"],"leadSources":["Google Local Search","Yelp Reviews","Facebook/Instagram Ads","Referral from Existing Customer","Walk-in/Drive-by","Google Maps Reviews","Vehicle Dealer Partnerships","Monthly Plan Upsell"],"dealTypes":["Ceramic Coating Package","Interior Detail Service","Monthly Maintenance Plan","Full Vehicle Detail","Fleet Services"],"taskTypes":["Send Quote via Email/Text","Confirm Appointment Reminder","Follow-up on Abandoned Quote","Schedule Post-Service Follow-up","Upsell Monthly Plan to One-Time Customer"],"kpis":["Monthly Plan Conversion Rate","Average Service Value per Customer","Quote-to-Appointment Close Rate","Customer Retention & Repeat Service Rate"],"industryTip":"Track appointment no-shows separately and implement 48-hour SMS reminders, as mobile scheduling friction is a major revenue killer in service businesses with fixed appointment slots."};
var KEY='greenai_crm_'+CFG.business.toLowerCase().replace(/[^a-z0-9]/g,'_');
var DB={contacts:[],tasks:[]};
function load(){try{var s=localStorage.getItem(KEY);if(s)DB=JSON.parse(s);}catch(e){}}
function save(){localStorage.setItem(KEY,JSON.stringify(DB));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function money(n){return '$'+(Number(n)||0).toLocaleString();}
function wonStage(){return CFG.pipelineStages[CFG.pipelineStages.length-2];}
function lostStage(){return CFG.pipelineStages[CFG.pipelineStages.length-1];}

function go(v,el){
  var views=document.querySelectorAll('.view');for(var i=0;i<views.length;i++)views[i].classList.remove('on');
  document.getElementById('v-'+v).classList.add('on');
  var links=document.querySelectorAll('.nav a');for(var j=0;j<links.length;j++)links[j].classList.remove('on');
  if(el)el.classList.add('on');
  if(v==='dashboard')renderDash();if(v==='contacts')renderContacts();if(v==='pipeline')renderBoard();if(v==='tasks')renderTasks();
}

function renderDash(){
  var won=wonStage(),lost=lostStage();
  var active=DB.contacts.filter(function(c){return c.stage!==won&&c.stage!==lost;});
  var pipeVal=active.reduce(function(a,c){return a+(Number(c.value)||0);},0);
  var month=new Date().getMonth(),year=new Date().getFullYear();
  var wonMonth=DB.contacts.filter(function(c){return c.stage===won&&c.wonAt&&new Date(c.wonAt).getMonth()===month&&new Date(c.wonAt).getFullYear()===year;});
  var wonVal=wonMonth.reduce(function(a,c){return a+(Number(c.value)||0);},0);
  var labels=CFG.kpis&&CFG.kpis.length>=4?CFG.kpis:['Total Contacts','Active Deals','Pipeline Value','Won This Month'];
  var vals=[DB.contacts.length,active.length,money(pipeVal),money(wonVal)];
  var h='';for(var i=0;i<4;i++){h+='<div class="kpi"><div class="lbl">'+esc(labels[i])+'</div><div class="val">'+vals[i]+'</div></div>';}
  document.getElementById('kpis').innerHTML=h;
  document.getElementById('tipbox').innerHTML='💡 '+esc(CFG.industryTip||'Follow up with every lead within 24 hours.');
  var recent=DB.contacts.slice(-5).reverse();
  if(!recent.length){document.getElementById('recent').innerHTML='<div class="empty"><div class="ico">👤</div>No contacts yet. Add your first lead to get started.</div>';return;}
  var t='<table><tr><th>Name</th><th>Company</th><th>Stage</th><th>Value</th></tr>';
  recent.forEach(function(c){t+='<tr><td>'+esc(c.name)+'</td><td>'+esc(c.company)+'</td><td><span class="pill">'+esc(c.stage)+'</span></td><td>'+money(c.value)+'</td></tr>';});
  document.getElementById('recent').innerHTML=t+'</table>';
}

function renderContacts(){
  if(!DB.contacts.length){document.getElementById('contactsCard').innerHTML='<div class="empty"><div class="ico">👤</div>No contacts yet.<br>Click "New Contact" to add your first lead.</div>';return;}
  var t='<table><tr><th>Name</th><th>Company</th><th>Email</th><th>Phone</th><th>Source</th><th>Stage</th><th>Value</th><th></th></tr>';
  DB.contacts.slice().reverse().forEach(function(c){
    t+='<tr><td><b>'+esc(c.name)+'</b></td><td>'+esc(c.company)+'</td><td>'+esc(c.email)+'</td><td>'+esc(c.phone)+'</td><td><span class="pill">'+esc(c.source)+'</span></td><td><span class="pill">'+esc(c.stage)+'</span></td><td>'+money(c.value)+'</td><td><span class="lnk" onclick="openContact(\''+c.id+'\')">Edit</span> &nbsp; <span class="del" onclick="delContact(\''+c.id+'\')">Delete</span></td></tr>';
  });
  document.getElementById('contactsCard').innerHTML=t+'</table>';
}

function renderBoard(){
  var h='';
  CFG.pipelineStages.forEach(function(stage){
    var inStage=DB.contacts.filter(function(c){return c.stage===stage;});
    h+='<div class="col"><h4>'+esc(stage)+' <span>'+inStage.length+'</span></h4>';
    inStage.forEach(function(c){
      var opts='';CFG.pipelineStages.forEach(function(s){opts+='<option'+(s===c.stage?' selected':'')+'>'+esc(s)+'</option>';});
      h+='<div class="deal"><b>'+esc(c.name)+'</b><div class="meta">'+esc(c.company||c.source||'')+'</div><div class="val">'+money(c.value)+'</div><select onchange="moveDeal(\''+c.id+'\',this.value)">'+opts+'</select></div>';
    });
    if(!inStage.length)h+='<div style="font-size:11px;color:var(--txt2);text-align:center;padding:14px 0">—</div>';
    h+='</div>';
  });
  document.getElementById('board').innerHTML=h;
}

function renderTasks(){
  if(!DB.tasks.length){document.getElementById('tasksCard').innerHTML='<div class="empty"><div class="ico">✅</div>No tasks yet.<br>Add follow-ups so no lead slips through.</div>';return;}
  var open=DB.tasks.filter(function(t){return !t.done;});
  var done=DB.tasks.filter(function(t){return t.done;});
  var h='';
  open.concat(done).forEach(function(t){
    h+='<div class="task'+(t.done?' done':'')+'"><input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleTask(\''+t.id+'\')"><div style="flex:1"><b>'+esc(t.title)+'</b><div class="meta">'+esc(t.type)+(t.due?' · due '+esc(t.due):'')+'</div></div><span class="del" onclick="delTask(\''+t.id+'\')">Delete</span></div>';
  });
  document.getElementById('tasksCard').innerHTML=h;
}

function fillSelect(id,arr,val){var el=document.getElementById(id);var h='';arr.forEach(function(o){h+='<option'+(o===val?' selected':'')+'>'+esc(o)+'</option>';});el.innerHTML=h;}

function openContact(id){
  document.getElementById('cId').value=id||'';
  document.getElementById('cTitle').textContent=id?'Edit Contact':'New Contact';
  fillSelect('cSource',CFG.leadSources,'');
  fillSelect('cStage',CFG.pipelineStages,'');
  fillSelect('cType',CFG.dealTypes&&CFG.dealTypes.length?CFG.dealTypes:['General'],'');
  var c=id?DB.contacts.filter(function(x){return x.id===id;})[0]:null;
  document.getElementById('cName').value=c?c.name:'';
  document.getElementById('cCompany').value=c?c.company:'';
  document.getElementById('cEmail').value=c?c.email:'';
  document.getElementById('cPhone').value=c?c.phone:'';
  document.getElementById('cValue').value=c?c.value:'';
  document.getElementById('cNotes').value=c?c.notes:'';
  if(c){document.getElementById('cSource').value=c.source;document.getElementById('cStage').value=c.stage;document.getElementById('cType').value=c.type;}
  document.getElementById('contactOv').classList.add('on');
}
function saveContact(){
  var id=document.getElementById('cId').value;
  var name=document.getElementById('cName').value.trim();
  if(!name){document.getElementById('cName').focus();return;}
  var stage=document.getElementById('cStage').value;
  var obj={id:id||uid(),name:name,company:document.getElementById('cCompany').value.trim(),
    email:document.getElementById('cEmail').value.trim(),phone:document.getElementById('cPhone').value.trim(),
    source:document.getElementById('cSource').value,stage:stage,type:document.getElementById('cType').value,
    value:Number(document.getElementById('cValue').value)||0,notes:document.getElementById('cNotes').value.trim()};
  if(stage===wonStage())obj.wonAt=new Date().toISOString();
  if(id){for(var i=0;i<DB.contacts.length;i++){if(DB.contacts[i].id===id){obj.wonAt=obj.wonAt||DB.contacts[i].wonAt;DB.contacts[i]=obj;}}}
  else DB.contacts.push(obj);
  save();closeOv('contactOv');refresh();
}
function delContact(id){if(!confirm('Delete this contact?'))return;DB.contacts=DB.contacts.filter(function(c){return c.id!==id;});save();refresh();}
function moveDeal(id,stage){for(var i=0;i<DB.contacts.length;i++){if(DB.contacts[i].id===id){DB.contacts[i].stage=stage;if(stage===wonStage())DB.contacts[i].wonAt=new Date().toISOString();}}save();renderBoard();}

function openTask(){fillSelect('tType',CFG.taskTypes&&CFG.taskTypes.length?CFG.taskTypes:['Call','Email','Follow-up'],'');document.getElementById('tTitle').value='';document.getElementById('tDue').value='';document.getElementById('taskOv').classList.add('on');}
function saveTask(){var title=document.getElementById('tTitle').value.trim();if(!title){document.getElementById('tTitle').focus();return;}DB.tasks.push({id:uid(),type:document.getElementById('tType').value,title:title,due:document.getElementById('tDue').value,done:false});save();closeOv('taskOv');renderTasks();}
function toggleTask(id){for(var i=0;i<DB.tasks.length;i++){if(DB.tasks[i].id===id)DB.tasks[i].done=!DB.tasks[i].done;}save();renderTasks();}
function delTask(id){DB.tasks=DB.tasks.filter(function(t){return t.id!==id;});save();renderTasks();}

function closeOv(id){document.getElementById(id).classList.remove('on');}
function refresh(){renderDash();renderContacts();renderBoard();renderTasks();}

function exportCSV(){
  var rows=[['Name','Company','Email','Phone','Source','Stage','Deal Type','Value','Notes']];
  DB.contacts.forEach(function(c){rows.push([c.name,c.company,c.email,c.phone,c.source,c.stage,c.type,c.value,(c.notes||'').replace(/\n/g,' ')]);});
  var csv=rows.map(function(r){return r.map(function(f){return '"'+String(f==null?'':f).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=CFG.business.replace(/[^a-z0-9]/gi,'-')+'-contacts.csv';a.click();
}

load();renderDash();
</script>
</body>
</html>
