<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent &mdash; GreenAI Solutions Team</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Nav -->
  <nav class="nav transparent" id="main-nav" aria-label="Main navigation">
    <div class="container">
      <div class="nav__inner">
        <a href="index.html" class="nav__logo" aria-label="GreenAI Solutions Team home">
          <div class="nav__logo-icon"><img src="logo-mark.png" alt="GreenAI Solutions Team crest" width="40" height="40" loading="eager" decoding="async"/></div>
          <div class="nav__logo-text">
            <span class="nav__logo-name">Green<span style="color:#D4AF37">AI</span></span>
            <span class="nav__logo-sub">Solutions Team</span>
          </div>
        </a>
      </div>
    </div>
  </nav>

  <!-- Confirmation Section -->
  <section style="
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, #0a1f0e 0%, #1a5c2a 50%, #236b35 100%);
    padding: 6rem 1.5rem 3rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  ">

    <!-- Background grid -->
    <div aria-hidden="true" style="
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 55px 55px;
      pointer-events: none;
    "></div>

    <!-- Glow -->
    <div aria-hidden="true" style="
      position: absolute; top: 10%; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(76,175,110,.15) 0%, transparent 65%);
      pointer-events: none;
    "></div>

    <div style="position: relative; max-width: 540px; width: 100%;">

      <!-- Check icon -->
      <div style="
        width: 88px; height: 88px;
        background: rgba(76,175,110,.18);
        border: 2px solid rgba(76,175,110,.45);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 2rem;
      ">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4caf6e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <!-- Heading -->
      <h1 style="
        color: white;
        font-family: 'Playfair Display', serif;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.2;
        margin-bottom: 1rem;
      ">Message Sent.</h1>

      <!-- Sub -->
      <p style="
        color: rgba(255,255,255,.78);
        font-size: 1.05rem;
        line-height: 1.8;
        margin-bottom: 2.5rem;
        max-width: 440px;
        margin-left: auto; margin-right: auto;
      ">
        Your message is in Jaden's inbox. You'll hear back personally within a few hours &mdash; usually the same day.
      </p>

      <!-- Contact card -->
      <div style="
        background: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.15);
        border-radius: 18px;
        padding: 1.75rem 2rem;
        margin-bottom: 2.5rem;
      ">
        <p style="color: rgba(255,255,255,.6); font-size: .85rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 1.25rem;">Need to reach Jaden right now?</p>
        <div style="display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;">
          <a href="tel:4807980753" style="
            display: flex; align-items: center; gap: .6rem;
            color: #4caf6e; font-weight: 700; font-size: 1rem;
            text-decoration: none;
          ">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.39 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            (480) 798-0753
          </a>
          <a href="mailto:jaden@greenaidigital.com" style="
            display: flex; align-items: center; gap: .6rem;
            color: rgba(255,255,255,.75); font-weight: 600; font-size: .95rem;
            text-decoration: none;
          ">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            jaden@greenaidigital.com
          </a>
        </div>
      </div>

      <!-- Back to Home -->
      <a href="index.html" style="
        display: inline-flex; align-items: center; gap: .6rem;
        background: white; color: #1a5c2a;
        padding: .9rem 2.25rem;
        border-radius: 100px;
        font-weight: 700; font-size: .95rem;
        text-decoration: none;
        transition: all .2s ease;
      ">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Home
      </a>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
