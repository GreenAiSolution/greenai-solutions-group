name = "greenai-studio-api"
main = "src/worker.js"
compatibility_date = "2025-01-15"

# Workers AI — free image generation (Flux 1 Schnell)
[ai]
binding = "AI"

# Public variables (NOT secrets — okay to commit)
[vars]
ALLOWED_ORIGIN = "https://greenaidigital.com,https://www.greenaidigital.com"
CLAUDE_MODEL   = "claude-haiku-4-5-20251001"

# Secrets are set with:
